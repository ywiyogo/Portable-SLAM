madgwick:
  ros__parameters:
    use_mag: true               # Use magnetometer for heading estimation
    stateless: false            # Use stateful filter
    reverse_tf: false
    publish_debug_topics: true  # Publish debug information
    publish_tf: false           # Disable publishing TF (handled by robot_localization)
    world_frame: "enu"          # East-North-Up frame for orientation
    gain: 0.3                   # Increased for faster response to hand movements
    zeta: 0.1                   # Added damping to reduce oscillations
    orientation_stddev: 0.01    # Standard deviation for orientation estimate
    fixed_frame: "base_link"    # Fixed frame for orientation
