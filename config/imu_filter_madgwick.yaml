# Configuration for IMU filter using Madgwick algorithm
imu_filter_madgwick:
  ros__parameters:
    # Filter settings
    use_mag: false
    stateless: false
    zeta: 0.01  # Increased to reduce gyro drift
    beta: 0.3   # Increased to trust gyro more for rotational movements
    
    # Frame settings
    # Changed from 'enu' to 'odom' to align with EKF and SLAM world frames
    world_frame: odom
    fixed_frame: imu_link
    
    # Noise parameters
    orientation_stddev: 0.03      # Reduced to increase confidence in orientation
    angular_velocity_stddev: 0.01  # Reduced to increase confidence in angular velocity
    linear_acceleration_stddev: 0.1
    
    # Publishing settings
    publish_tf: true
    reverse_tf: false
    publish_rate: 50.0  # Increased to handle higher velocity movements
