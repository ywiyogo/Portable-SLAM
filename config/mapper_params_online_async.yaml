slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss
    ceres_huber_loss_delta: 2.0  # Reduced for better outlier handling

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_map_saver: true
    mode: mapping #localization

    # QoS Settings
    qos_reliability: 2  # 0 = system default, 1 = reliable, 2 = best effort
    qos_history: 1      # 0 = system default, 1 = keep last, 2 = keep all
    qos_depth: 10       # Queue size


    # Use IMU-assisted scan matching
    use_odom: true  # Keep true to use IMU data
    odom_topic: "/odometry/filtered"  # EKF filtered IMU data

    debug_logging: true
    throttle_scans: 1  # Process all scans
    transform_publish_period: 0.02  # Fast updates
    map_update_interval: 2.0  # Moderate update rate
    resolution: 0.05
    max_laser_range: 12.0  # Full range of Tmini pro
    minimum_time_interval: 0.1  # Quick processing
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    stack_size_to_use: 80000000
    enable_interactive_mode: true

    # General Parameters - Optimized for LiDAR primary with IMU assist
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.1  # Small distance for frequent updates
    minimum_travel_heading: 0.1   # Small angle for frequent updates
    scan_buffer_size: 20         # Good buffer for matching
    scan_buffer_maximum_scan_distance: 12.0
    link_match_minimum_response_fine: 0.05  # More permissive matching
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 8
    loop_match_maximum_variance_coarse: 3.0  
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters - Tuned for LiDAR-primary operation
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.03 

    # Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.5      # Moderate penalty
    angle_variance_penalty: 0.5         # Use IMU for angles
    fine_search_angle_offset: 0.00349   # ~0.2 degrees
    coarse_search_angle_offset: 0.349   # ~20 degrees
    coarse_angle_resolution: 0.0349     # ~2 degrees
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
