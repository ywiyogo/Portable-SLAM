ekf_filter_node:
  ros__parameters:
    frequency: 20.0  # Reduced to manageable rate
    sensor_timeout: 0.5  # Increased for more tolerance
    two_d_mode: false
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: true
    debug_out_file: ekf_node.log
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom
  
    imu0: /imu/data_raw

    # IMU configuration - focus on orientation and short-term motion
    imu0_config: [false, false, false,   # Disable position (handled by LiDAR)
                 true,  true,  true,     # Enable orientation (from IMU)
                 true,  true,  true,     # Enable velocity (short-term)
                 true,  true,  true,     # Enable angular velocity
                 true,  true,  true]     # Enable orientation covariance

    # IMU processing parameters
    imu0_remove_gravitational_acceleration: true
    imu0_linear_acceleration_rejection_threshold: 0.8  # More permissive for motion detection
    imu0_angular_velocity_rejection_threshold: 0.8
    
    # Dynamic process noise - higher trust in orientation than position
